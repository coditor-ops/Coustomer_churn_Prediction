<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="glass-container">
        <header>
            <h1>Churn <span class="neon-text">Oracle</span></h1>
            <p>Predict customer retention with our AI engine</p>
        </header>

        <form id="predictionForm" class="grid-form">
            <!-- Form groups will be dynamically generated by JS or static HTML -->
            <!-- Using static for full control over types -->
            
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Senior Citizen</label>
                <select name="SeniorCitizen" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Partner</label>
                <select name="Partner" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Dependents</label>
                <select name="Dependents" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Tenure (Months)</label>
                <input type="number" name="tenure" min="0" value="1" required>
            </div>

            <div class="form-group">
                <label>Phone Service</label>
                <select name="PhoneService" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Multiple Lines</label>
                <select name="MultipleLines" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No phone service">No phone service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Internet Service</label>
                <select name="InternetService" required>
                    <option value="Fiber optic">Fiber optic</option>
                    <option value="DSL">DSL</option>
                    <option value="No">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Online Security</label>
                <select name="OnlineSecurity" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Online Backup</label>
                <select name="OnlineBackup" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Device Protection</label>
                <select name="DeviceProtection" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Tech Support</label>
                <select name="TechSupport" required>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Streaming TV</label>
                <select name="StreamingTV" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Streaming Movies</label>
                <select name="StreamingMovies" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Contract</label>
                <select name="Contract" required>
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Paperless Billing</label>
                <select name="PaperlessBilling" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Payment Method</label>
                <select name="PaymentMethod" required>
                    <option value="Electronic check">Electronic check</option>
                    <option value="Mailed check">Mailed check</option>
                    <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                    <option value="Credit card (automatic)">Credit card (automatic)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Monthly Charges ($)</label>
                <input type="number" step="0.01" name="MonthlyCharges" value="50.00" required>
            </div>
            
            <div class="form-group">
                <label>Total Charges ($)</label>
                <input type="number" step="0.01" name="TotalCharges" value="50.00" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="neon-btn">
                    <span>Predict Probability</span>
                    <div class="liquid"></div>
                </button>
            </div>
        </form>

        <div id="resultModal" class="hidden glass-card result-panel">
            <h2 id="predictionResult">Evaluating...</h2>
            <div class="progress-bar-container">
                <div id="confidenceBar" class="progress-bar"></div>
            </div>
            <p id="predictionConfidence">Confidence: --%</p>
            <button id="resetBtn" class="outline-btn">Dismiss</button>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
